<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Codex Terminal</title>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="topbar">
      <div class="title">Quick Codex Host</div>
      <div class="controls">
        <select id="mode">
          <option value="passthrough">passthrough (raw codex)</option>
          <option value="orchestrated">orchestrated (qc native follow)</option>
        </select>
        <input id="dir" placeholder="Working directory" />
        <input id="maxTurns" type="number" min="1" max="50" value="5" />
        <button id="start">Start</button>
        <button id="stop">Stop</button>
      </div>
    </div>

    <div id="terminal"></div>

    <div id="inputbar">
      <input id="task" placeholder="Type a task (or /qc commands)..." />
      <button id="send">Send</button>
    </div>

    <script src="./vendor/xterm.js"></script>
    <script src="./vendor/xterm-addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
