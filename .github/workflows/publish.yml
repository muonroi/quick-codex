name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Lint package shape
        run: bash scripts/lint-skills.sh

      - name: Publish package (skip existing)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          DIST_TAG=latest

          if [[ "${PKG_VERSION}" == *-* ]]; then
            DIST_TAG="${PKG_VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          fi

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published on npm. Skipping."
            exit 0
          fi

          echo "Publishing ${PKG_NAME}@${PKG_VERSION} with npm dist-tag ${DIST_TAG}"
          npm publish --access public --provenance --tag "${DIST_TAG}"
