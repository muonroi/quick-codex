  </text>

  <rect x="20" y="408" width="8" height="13" fill="#cdd6f4" opacity="0">
    <animate attributeName="opacity" values="0;1;0;1;0" dur="1s" begin="6.1s" repeatCount="indefinite"/>
  </rect>
</svg>
